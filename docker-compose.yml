services:
  backend:
    build:
      context: ./inventory_server/backend
    environment:
      OIMS_HOST: 0.0.0.0
      OIMS_PORT: 3010
      OIMS_SECRET_KEY: ${OIMS_SECRET_KEY:-change-me}
      OIMS_ADMIN_USERNAME: ${OIMS_ADMIN_USERNAME:-admin}
      OIMS_ADMIN_PASSWORD: ${OIMS_ADMIN_PASSWORD:-change-me}
      OIMS_BROKER_HOSTNAME: ${OIMS_BROKER_HOSTNAME:?Set OIMS_BROKER_HOSTNAME in .env}
      OIMS_BROKER_PORT: 1883
      OIMS_DATABASE_URL: sqlite:////app/data/oims.db
      OIMS_CORS_ORIGINS: ${OIMS_CORS_ORIGINS:?Set OIMS_CORS_ORIGINS in .env}
    expose:
      - "3010"
    volumes:
      - ./data/backend:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./inventory_server/frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
